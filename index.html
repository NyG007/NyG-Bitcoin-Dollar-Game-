<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>NyG Bitcoin dollar Game</title>
</head>

<body>

    <div class="container">
        <div class="stats">
            <p id="bitcoins-count">Bitcoins: 0</p>
            <p id="dollars-count">Dollars: 0</p>
        </div>
        <div class="coin" id="coin">
            <div class="bitcoins">
                <img src="bitcoins.svg">
            </div>
            <div class="dollars">
                <img src="dollars.svg">
            </div>
        </div>
        <div class="buttons">
            <button id="flip-button">
                Flip Coin
            </button>
            <button id="reset-button">
                Reset
            </button>
        </div>
    </div>


    <script src="index.js"></script>
</body>

</html>
